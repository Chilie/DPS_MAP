conditioning:
  method: dmps #_poisson #dmps
  params:
    scale: 1.0 #1.0 #1.75 #1.75 #0.05 #1.75

data:
  name: imagenet # choices: ffhq, bedroom, cat, celeba-hq
  root: ./data/imagenet256_10/ # address to put the associated images

measurement:
  operator:
    name: super_resolution
    in_shape: !!python/tuple [1, 3, 256, 256]
    scale_factor: 4
    type: bicubic  
  noise: 
    name: gaussian
    sigma: 0.05
